schema_version: v1alpha1

record:
  default_mode: record
  storage_path: .stagehand/runs
  capture:
    max_body_bytes: 1048576
    include_headers:
      - content-type
      - accept
    redact_before_persist: true

replay:
  mode: exact
  clock_mode: wall
  allow_live_network: false

scrub:
  enabled: true
  policy_version: v1
  custom_rules: []
  detectors:
    email: true
    phone: true
    ssn: true
    credit_card: true
    jwt: true
    api_key: true

fallback:
  allowed_tiers:
    - exact
    - nearest_neighbor
    - state_synthesis
  llm_synthesis:
    enabled: false
    provider_env: OPENAI_API_KEY
    model: gpt-5-mini

auth:
  default_mode: permissive
  service_modes:
    stripe: strict-recorded
    openai: permissive

services:
  - name: internal-crm
    type: api
    match:
      host: crm.internal.acme.com
      path_prefix: /v1
    replay:
      mode: generic_http
      allowed_tiers: [0, 1]
    ignore:
      request_paths:
        - headers.x-request-id
        - headers.x-trace-id
        - query.cursor
        - body.request_id
        - body.created_at
      response_paths:
        - body.generated_at
        - body.trace_id
  - name: billing-api
    type: api
    match:
      host: billing.internal.acme.com
  - name: admin-api
    type: api
    match:
      host: admin.internal.acme.com
      path_prefix: /admin
