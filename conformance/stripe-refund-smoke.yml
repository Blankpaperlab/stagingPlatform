schema_version: v1alpha1
cases:
  - id: stripe-refund-smoke
    service: stripe
    description: Verify the simulator matches Stripe test mode for a customer payment-intent refund flow.
    tags:
      - nightly
      - smoke
      - stripe
      - refund
    inputs:
      scenario: stripe_refund_smoke
      steps:
        - id: create-customer
          operation: customers.create
          request:
            email: refund-conformance@example.com
            name: Stagehand Refund Conformance
            metadata:
              stagehand_case: stripe_refund_smoke
          expect:
            status_code: 200

        - id: create-payment-intent
          operation: payment_intents.create
          request:
            amount: 1000
            currency: usd
            customer: '{{ create-customer.response.body.id }}'
            confirm: true
            automatic_payment_methods:
              enabled: true
              allow_redirects: never
            payment_method_data:
              type: card
              card:
                token: tok_visa
            metadata:
              stagehand_case: stripe_refund_smoke
          expect:
            status_code: 200

        - id: list-payment-intents
          operation: payment_intents.list
          request:
            customer: '{{ create-customer.response.body.id }}'
            limit: 1
          expect:
            status_code: 200

        - id: refund-payment
          operation: refunds.create
          request:
            payment_intent: '{{ create-payment-intent.response.body.id }}'
            reason: requested_by_customer
            metadata:
              stagehand_case: stripe_refund_smoke
          expect:
            status_code: 200
    real_service:
      network: true
      test_mode: true
      cost_estimate: no live charge; Stripe test-mode payment intent and refund only
      credentials:
        - env: STRIPE_SECRET_KEY
          required: true
          purpose: Stripe test-mode secret key for refund conformance.
    comparison:
      match:
        strategy: operation_sequence
      tolerated_diff_fields:
        - path: request.customer
          reason: Real Stripe and simulator customer IDs differ.
        - path: request.payment_intent
          reason: Real Stripe and simulator payment-intent IDs differ.
        - path: response.body.id
          reason: Real Stripe and simulator generate different object IDs.
        - path: response.body.created
          reason: Real Stripe timestamps are wall-clock values.
        - path: response.body.livemode
          reason: Real Stripe includes environment metadata not modeled by the simulator.
        - path: response.body.balance
          reason: Real Stripe customer objects include account balance metadata outside the simulator subset.
        - path: response.body.delinquent
          reason: Real Stripe customer objects include billing status metadata outside the simulator subset.
        - path: response.body.invoice_prefix
          reason: Real Stripe customer objects include billing metadata outside the simulator subset.
        - path: response.body.invoice_settings
          reason: Real Stripe customer objects include billing metadata outside the simulator subset.
        - path: response.body.next_invoice_sequence
          reason: Real Stripe customer objects include billing metadata outside the simulator subset.
        - path: response.body.preferred_locales
          reason: Real Stripe customer objects include locale metadata outside the simulator subset.
        - path: response.body.tax_exempt
          reason: Real Stripe customer objects include tax metadata outside the simulator subset.
        - path: response.body.url
          reason: Real Stripe list endpoints include API URL metadata.
        - path: response.body.has_more
          reason: Real Stripe list endpoints include pagination metadata.
        - path: response.body.data[0].id
          reason: Real Stripe and simulator generate different nested object IDs.
        - path: response.body.data[0].created
          reason: Real Stripe timestamps are wall-clock values.
        - path: response.body.data[0].client_secret
          reason: Client secrets are generated provider credentials.
        - path: response.body.data[0].customer
          reason: Nested generated customer IDs differ.
        - path: response.body.data[0].latest_charge
          reason: Real Stripe materializes charge IDs outside the simulator subset.
        - path: response.body.data[0].payment_method
          reason: Real Stripe materializes payment-method IDs outside the simulator subset.
        - path: response.body.data[0].amount_capturable
          reason: Real Stripe payment intents include fields outside the simulator subset.
        - path: response.body.data[0].amount_details
          reason: Real Stripe payment intents include fields outside the simulator subset.
        - path: response.body.data[0].amount_received
