name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "Go files need formatting:"
            echo "$unformatted"
            exit 1
          fi

      - name: Lint
        run: go vet ./...

      - name: Build
        run: |
          go build ./cmd/stagehand
          go build ./cmd/stagehandd

      - name: Test
        run: go test -cover ./...

  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: sdk/python/pyproject.toml

      - name: Install dependencies
        run: python -m pip install -e "sdk/python[dev]"

      - name: Check formatting
        run: python -m ruff format --check sdk/python

      - name: Lint
        run: python -m ruff check sdk/python

      - name: Test
        run: python -m pytest sdk/python/tests

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check:repo

      - name: Lint
        run: npm run lint:typescript

      - name: Test
        run: npm run test:typescript
