schema_version: v1alpha1
session: onboarding-flow

baseline:
  branch: main
  require_existing: true

replay:
  mode: exact
  forbid_live_network: true

fallback:
  disallowed_tiers:
    - llm_synthesis

error_injection:
  enabled: true
  rules:
    - match:
        service: stripe
        operation: payment_intents.create
        nth_call: 3
      inject:
        library: stripe.card_declined

ci:
  fail_on:
    - behavior_diff
    - assertion_failure
    - fallback_regression
  report_format: github-markdown
  artifact_name: stagehand-run
  post_pr_comment: true
  max_fallback_tier: nearest_neighbor
